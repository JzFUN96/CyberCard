<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎀 生日祝福</title>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+QingKe+HuangYou&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #fff5f7 0%, #f9e6ff 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
      padding: 20px;
      overflow-x: hidden;
    }
    .card {
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><circle cx="20" cy="20" r="3" fill="%23ffb6c1" opacity="0.3"/><circle cx="60" cy="50" r="2" fill="%23ff99cc" opacity="0.4"/><circle cx="80" cy="20" r="4" fill="%23ffccff" opacity="0.2"/></svg>');
      background-color: white;
      border-radius: 30px;
      box-shadow: 0 10px 30px rgba(255, 105, 180, 0.25);
      padding: 45px 35px;
      text-align: center;
      max-width: 520px;
      width: 100%;
      position: relative;
      border: 3px dashed #ffb6c1;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .header {
      position: relative;
      margin-bottom: 20px;
    }
    .age-badge {
      background: linear-gradient(45deg, #ff9ec9, #ffb74d);
      color: white;
      font-family: 'ZCOOL QingKe HuangYou', cursive;
      font-size: 2.8rem;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 15px;
      box-shadow: 0 5px 15px rgba(255, 158, 201, 0.4);
      border: 4px solid white;
      position: relative;
      z-index: 2;
    }
    h1 {
      font-family: 'ZCOOL QingKe HuangYou', cursive;
      color: #ff6b9d;
      font-size: 3.2em;
      margin: 10px 0;
      text-shadow: 2px 2px 0 #ffd6e7;
      letter-spacing: 3px;
    }
    .name {
      font-family: 'ZCOOL QingKe HuangYou', cursive;
      color: #ff4da6;
      font-size: 2.1em;
      display: block;
      margin: 8px 0;
      animation: heartbeat 1.2s ease-in-out infinite;
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    .blessing {
      background: #fff9fb;
      border-radius: 20px;
      padding: 25px;
      margin: 25px 0;
      border: 2px solid #ffd6e7;
      line-height: 1.7;
      font-size: 1.15em;
      color: #e65199;
    }
    .blessing-item {
      margin: 12px 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .blessing-item span { margin: 0 8px; }
    .normal-bless { color: #ff6b9d; font-weight: bold; }
    .silly-bless { 
      color: #8a2be2; 
      font-style: italic;
      position: relative;
      display: inline-block;
    }
    .silly-bless:hover::after {
      content: "（认真脸.jpg）";
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.8em;
      color: #ff9ec9;
      background: #fff0f5;
      padding: 2px 8px;
      border-radius: 10px;
      white-space: nowrap;
    }
    button {
      background: linear-gradient(to right, #ff9ec9, #ffb74d, #ff9ec9);
      color: white;
      border: none;
      padding: 16px 55px;
      font-size: 1.35em;
      border-radius: 50px;
      cursor: pointer;
      margin-top: 10px;
      transition: all 0.3s;
      box-shadow: 0 6px 0 rgba(214, 83, 133, 0.3);
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: bold;
      letter-spacing: 2px;
      position: relative;
      overflow: hidden;
    }
    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 0 rgba(214, 83, 133, 0.4);
    }
    button:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 rgba(214, 83, 133, 0.3);
    }
    button::after {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
      transform: scale(0);
      transition: transform 0.5s ease-out;
      pointer-events: none;
    }
    button:hover::after {
      transform: scale(1);
    }
    #surprise {
      display: none;
      margin-top: 25px;
      font-size: 1.5em;
      color: #ff4da6;
      font-family: 'ZCOOL QingKe HuangYou', cursive;
      animation: pulse 1.8s infinite;
      text-shadow: 0 0 10px rgba(255, 105, 180, 0.5);
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }
    .deco {
      font-size: 2.5rem;
      margin: 10px 5px;
      display: inline-block;
      animation: bounce 1s infinite alternate;
    }
    @keyframes bounce {
      from { transform: translateY(0); }
      to { transform: translateY(-8px); }
    }
    .footer {
      margin-top: 25px;
      font-size: 0.95em;
      color: #ff9ec9;
      font-style: italic;
    }
    @media (max-width: 480px) {
      .card { padding: 30px 20px; border-radius: 25px; }
      h1 { font-size: 2.6em; }
      .age-badge { width: 85px; height: 85px; font-size: 2.3rem; }
      button { padding: 14px 40px; font-size: 1.15em; }
      .blessing { font-size: 1.05em; padding: 20px 15px; }
    }
    /* 飘落爱心动画 */
    .floating-heart {
      position: fixed;
      font-size: 1.5rem;
      opacity: 0;
      pointer-events: none;
      z-index: 1000;
      animation: fall 8s linear forwards;
    }
    @keyframes fall {
      0% { transform: translateY(-10vh) translateX(0); opacity: 1; }
      100% { transform: translateY(110vh) translateX(calc(50vw * var(--dir))); opacity: 0; }
    }
      /* 音乐控制按钮 - 右下角悬浮 */
.music-btn {
  position: fixed;
  bottom: 25px;
  right: 25px;
  width: 65px;
  height: 65px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ff9ec9, #ffb74d);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 2rem;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4);
  z-index: 3000;
  transition: all 0.3s ease;
  border: 3px solid white;
  animation: bounce 1.5s infinite alternate;
}
@keyframes bounce {
  from { transform: scale(1); }
  to { transform: scale(1.08); }
}
.music-btn:hover {
  transform: scale(1.15) rotate(15deg);
  box-shadow: 0 6px 20px rgba(255, 105, 180, 0.6);
}
.music-btn.paused {
  background: linear-gradient(135deg, #a0a0a0, #d0d0d0);
  animation: none;
}
.music-btn::after {
  content: "♪";
  position: absolute;
  font-size: 1.2rem;
  bottom: -25px;
  color: #ff6b9d;
  font-weight: bold;
  opacity: 0;
  transition: opacity 0.3s;
}
.music-btn:hover::after {
  opacity: 1;
}
  </style>
</head>
<body>
<audio id="bgm" loop>
  <source src="Birthday.ogg" type="audio/mpeg">
  您的浏览器不支持音频
</audio>
  <div class="card">
    <div class="header">
      <div class="age-badge">十六岁</div>
      <h1>生日快乐！</h1>
      <div class="name">阿怡</div>
    </div>
    
    <div class="deco">🎀 ✨ 🎀</div>
    
    <div class="blessing">
      <div class="blessing-item">💖 祝你永远不得痔疮</div>
      <div class="blessing-item">🌈 大便永远通畅</div>
      <div class="blessing-item">🌸 姨妈永远正常</div>
      <div class="blessing-item normal-bless">✨ 新的一岁：永远不死！奶茶自由！考试全过！</div>
    </div>
    
    <div class="deco">🎂 🌸 🎈</div>
    
    <button onclick="showSurprise()">🎀 戳我有惊喜～ 🎀</button>
    <div id="surprise">🎁 假装这是一个红包(づ｡◕‿‿◕｡)づ</div>
    
  </div>

  <script>
    // 飘落爱心背景
    function createHearts() {
      const hearts = ['💖', '💗', '💓', '💕', '💘', '💝', '🌸', '🎀'];
      setInterval(() => {
        const heart = document.createElement('div');
        heart.className = 'floating-heart';
        heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        heart.style.left = `${Math.random() * 100}%`;
        heart.style.setProperty('--dir', Math.random() > 0.5 ? '1' : '-1');
        heart.style.animationDuration = `${Math.random() * 5 + 6}s`;
        document.body.appendChild(heart);
        
        // 5秒后移除
        setTimeout(() => {
          heart.remove();
        }, 8000);
      }, 300);
    }
    
    // 彩带动画升级版
    function showSurprise() {
      const el = document.getElementById('surprise');
      if (el.style.display === 'block') return;
      el.style.display = 'block';
      
      // 播放惊喜音效（需用户交互触发）
      const audio = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-happy-birthday-music-box-54.mp3');
      audio.volume = 0.3;
      audio.play().catch(e => console.log('音频需用户交互触发'));
      
      // 生成彩带（爱心/星星/礼物）
      const confettiTypes = ['💖', '✨', '🎀', '🌸', '🎀', '💫', '🎀', '💝'];
      for (let i = 0; i < 80; i++) {
        const confetti = document.createElement('div');
        confetti.innerHTML = confettiTypes[Math.floor(Math.random() * confettiTypes.length)];
        confetti.style.position = 'fixed';
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.top = '-20px';
        confetti.style.fontSize = (Math.random() * 1.2 + 0.8) + 'rem';
        confetti.style.zIndex = '2000';
        confetti.style.pointerEvents = 'none';
        confetti.style.color = ['#ff6b9d', '#ffb74d', '#9c89ff', '#ff9ec9'][Math.floor(Math.random()*4)];
        document.body.appendChild(confetti);
        
        // 落下动画
        const duration = Math.random() * 3000 + 2500;
        confetti.animate([
          { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
          { transform: `translateY(${window.innerHeight + 50}px) rotate(${Math.random()*720}deg)`, opacity: 0 }
        ], { 
          duration, 
          easing: 'cubic-bezier(0.1, 0.8, 0.2, 1)',
          fill: 'forwards'
        });
        
        setTimeout(() => confetti.remove(), duration);
      }
    }
    
    // 页面加载时启动爱心飘落
    window.addEventListener('load', () => {
      createHearts();
      
      // 小彩蛋：双击名字触发爱心爆炸
      document.querySelector('.name').addEventListener('dblclick', () => {
        for (let i = 0; i < 20; i++) {
          const heart = document.createElement('div');
          heart.textContent = '💖';
          heart.style.position = 'fixed';
          heart.style.left = `${Math.random() * 100}%`;
          heart.style.top = `${Math.random() * 100}%`;
          heart.style.fontSize = '1.5rem';
          heart.style.zIndex = '3000';
          heart.style.pointerEvents = 'none';
          heart.style.opacity = '0.9';
          document.body.appendChild(heart);
          
          heart.animate([
            { transform: 'scale(0.2) translate(0,0)', opacity: 0.9 },
            { transform: `scale(1.5) translate(${(Math.random()-0.5)*200}px, ${(Math.random()-0.5)*200}px)`, opacity: 0 }
          ], {
            duration: 1000,
            easing: 'cubic-bezier(0.17, 0.67, 0.83, 0.67)',
            fill: 'forwards'
          });
          
          setTimeout(() => heart.remove(), 1000);
        }
      });
    });
    // 音乐控制
const bgm = document.getElementById('bgm');
const musicBtn = document.createElement('div');
musicBtn.className = 'music-btn';
musicBtn.innerHTML = '🎵';
musicBtn.id = 'music-btn';
document.body.appendChild(musicBtn);

let isPlaying = false;
musicBtn.addEventListener('click', () => {
  if (isPlaying) {
    bgm.pause();
    musicBtn.innerHTML = '🎵';
    musicBtn.classList.remove('paused');
    isPlaying = false;
  } else {
    bgm.play().then(() => {
      musicBtn.innerHTML = '⏸️';
      musicBtn.classList.add('paused');
      isPlaying = true;
    }).catch(e => {
      // 播放被阻止时的友好提示
      alert('🎵 小提示：请点击页面任意位置激活音频哦～\n（这是浏览器的安全小规则✨）');
      // 监听下一次页面点击
      const activateAudio = () => {
        bgm.play().then(() => {
          musicBtn.innerHTML = '⏸️';
          musicBtn.classList.add('paused');
          isPlaying = true;
          document.body.removeEventListener('click', activateAudio);
        }).catch(() => alert('还是不行？可能是浏览器设置问题呢~'));
      };
      document.body.addEventListener('click', activateAudio, { once: true });
    });
  }
});

// 彩蛋：双击贺卡任意位置也能控制音乐！
document.querySelector('.card').addEventListener('dblclick', () => {
  if (!isPlaying) {
    bgm.play().then(() => {
      musicBtn.innerHTML = '⏸️';
      musicBtn.classList.add('paused');
      isPlaying = true;
    }).catch(() => {});
  }
});
  </script>
</body>
</html>
